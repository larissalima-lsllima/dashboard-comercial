<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Comercial de Empresas em Onboarding</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#fff;--surface:#f6f8fa;--surface2:#eaeef2;--border:#d0d7de;--text:#1f2328;--muted:#636e7b;--green:#1a7f37;--red:#cf222e;--yellow:#9a6700;--orange:#bc4c00;--blue:#0969da;--purple:#8250df;--accent:#0969da}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:700}
.topbar-scope{font-size:11px;color:var(--muted)}
.topbar-scope b{color:var(--blue)}
#clock{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
.kpi .val{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
.kpi.danger .val{color:var(--red)}.kpi.warn .val{color:var(--yellow)}.kpi.ok .val{color:var(--green)}.kpi.info .val{color:var(--blue)}
/* Target split */
.target-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.split-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.split-hdr{padding:9px 14px;background:var(--surface2);font-weight:600;font-size:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{background:var(--accent);color:#fff;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700}
/* HANDOVER SECTION */
.handover-block{background:var(--surface);border:1px solid #bf8700;border-radius:8px;margin-bottom:24px;overflow:hidden}
.handover-hdr{padding:10px 16px;background:#fff8c5;border-bottom:1px solid #bf8700;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.handover-hdr h3{font-size:13px;font-weight:700;color:#7d4e00;display:flex;align-items:center;gap:8px}
.handover-body{display:none;padding:16px}
.handover-block.open .handover-body{display:block}
.handover-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.hw-kpi{background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px}
.hw-kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.hw-kpi .val{font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#7d4e00}
.hw-kpi .sub{font-size:10px;color:var(--muted);margin-top:2px}
.handover-targets{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.hw-tgt{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.hw-tgt-hdr{padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}
.hw-tgt-body{padding:10px 12px}
.hw-exec-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.hw-exec-table th{text-align:left;padding:4px 8px;background:var(--surface2);color:var(--muted);font-weight:600;font-size:10px;border-bottom:1px solid var(--border)}
.hw-exec-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.hw-exec-table tr:last-child td{border-bottom:none}
.hw-exec-table tr:nth-child(even) td{background:rgba(0,0,0,.02)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid;white-space:nowrap}
.badge.atrasado{color:#cf222e;border-color:#cf222e;background:#fff0ee}
.badge.postergada{color:#9a6700;border-color:#bf8700;background:#fff8c5}
.badge.churn{color:#8a0000;border-color:#d1242f;background:#ffebe9}
.badge.no_prazo{color:#1a7f37;border-color:#1a7f37;background:#dafbe1}
.badge.antecipada{color:#0550ae;border-color:#0550ae;background:#ddf4ff}
.badge.nao_considerado{color:var(--muted);border-color:var(--border);background:var(--surface)}
/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-size:11px;color:var(--muted)}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.filter-btn:hover{background:var(--surface2)}.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.expand-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.expand-btn:hover{background:var(--surface2);color:var(--text)}
.search-input{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;width:220px;margin-left:auto}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.12)}
.search-input::placeholder{color:var(--muted)}
/* Coord */
.coord-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.coord-hdr{padding:12px 20px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;border-bottom:1px solid var(--border);transition:background .12s}
.coord-hdr:hover{background:var(--surface2)}
.coord-hdr-left{display:flex;align-items:center;gap:10px}
.coord-hdr-left h2{font-size:13px;font-weight:700}
.coord-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta-pill{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid}
.meta-pill.red{color:#cf222e;border-color:#cf222e;background:#fff0ee}
.meta-pill.yellow{color:#9a6700;border-color:#bf8700;background:#fff8c5}
.meta-pill.blue{color:#0969da;border-color:#0969da;background:#ddf4ff}
.meta-pill.green{color:#1a7f37;border-color:#1a7f37;background:#dafbe1}
.chevron{color:var(--muted);transition:transform .2s;font-size:11px}
.coord-block.open .chevron{transform:rotate(90deg)}
.coord-body{display:none;padding:16px 20px}
.coord-block.open .coord-body{display:block}
/* Exec */
.exec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(560px,1fr));gap:12px}
.exec-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.exec-hdr{background:var(--surface);padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s}
.exec-hdr:hover{background:var(--surface2)}
.exec-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.exec-fin{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px}
.fin-item{display:flex;flex-direction:column;gap:1px}
.fin-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.fin-val{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px}
.fin-val.blue{color:var(--blue)}.fin-val.green{color:var(--green)}.fin-val.red{color:var(--red)}.fin-val.pos{color:var(--green)}
.track-wrap{flex:1}
.track{position:relative;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-c{position:absolute;height:100%;background:var(--blue);border-radius:3px;top:0;left:0}
.bar-r{position:absolute;height:100%;background:var(--green);border-radius:3px;top:0;left:0;opacity:.7}
.exec-status{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--border)}
.exec-body{display:none}
/* Cluster & target */
.cluster-section{padding:8px 14px 12px}
.cluster-section+.cluster-section{border-top:1px solid var(--border)}
.cluster-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;padding:5px 0 4px;display:flex;align-items:center;gap:5px}
.cluster-lbl.estoque{color:var(--purple)}.cluster-lbl.novos{color:var(--blue)}
.tgt-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:7px;overflow:hidden}
.tgt-hdr{padding:6px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .1s}
.tgt-hdr:hover{background:#dde3ea}
.tgt-tag{font-size:10px;font-weight:700;color:var(--orange);min-width:55px}
.tgt-badges{display:flex;gap:5px;flex-wrap:wrap}
.tgt-fin{margin-left:auto;display:flex;gap:8px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);align-items:center}
.tgt-details{padding:8px 12px 4px;display:none}
/* Status sections */
.ss{margin-bottom:8px;overflow:hidden;border:1px solid var(--border);border-radius:5px}
.ss-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;cursor:pointer;user-select:none;font-size:11px;font-weight:700;border-bottom:1px solid transparent;transition:background .1s}
.ss.open .ss-hdr{border-bottom-color:var(--border)}
.ss-chev{font-size:10px;color:var(--muted);transition:transform .15s}
.ss.open .ss-chev{transform:rotate(90deg)}
.ss.atrasado .ss-hdr{background:#fff0ee;color:#cf222e}.ss.atrasado .ss-hdr:hover{background:#ffe5e2}
.ss.postergada .ss-hdr{background:#fff8c5;color:#9a6700}.ss.postergada .ss-hdr:hover{background:#fff0a0}
.ss.churn .ss-hdr{background:#ffebe9;color:#8a0000}.ss.churn .ss-hdr:hover{background:#ffdcd9}
.ss.no_prazo .ss-hdr{background:#dafbe1;color:#1a7f37}.ss.no_prazo .ss-hdr:hover{background:#c6f6d1}
.ss.antecipada .ss-hdr{background:#ddf4ff;color:#0550ae}.ss.antecipada .ss-hdr:hover{background:#c8ecff}
.ss-body{display:none}
.ss.open .ss-body{display:block}
.dtable{width:100%;border-collapse:collapse;font-size:11px}
.dtable th{text-align:left;padding:5px 8px;background:var(--surface2);color:var(--muted);font-weight:600;font-size:10px;border-bottom:1px solid var(--border)}
.dtable td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.dtable tr:last-child td{border-bottom:none}
.dtable tr:nth-child(even) td{background:rgba(0,0,0,.02)}
.co{font-weight:600;color:var(--blue);font-size:11px}
.desc{color:var(--muted);font-size:10px;line-height:1.4;max-height:72px;overflow-y:auto;white-space:pre-wrap;font-family:'IBM Plex Mono',monospace}
.money{font-family:'IBM Plex Mono',monospace;font-size:10px}
.money.pos{color:var(--green)}.money.neg{color:var(--red)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

function buildSummary(){
  const s=RAW.summary,m1=s.M1,m2=s.M2;
  const totAt=m1.atrasado+m2.atrasado,totPost=m1.postergado+m2.postergado,totCh=m1.churn+m2.churn;
  const totC=m1.recarga_contratada+m2.recarga_contratada,totR=m1.recarga_revisada+m2.recarga_revisada,delta=totR-totC;
  document.getElementById('summary-section').innerHTML=`
    <div class="section-title" style="margin-top:4px">Resumo Geral</div>
    <div class="kpi-grid">
      <div class="kpi danger"><div class="lbl">Contas Atrasadas</div><div class="val">${totAt}</div><div class="sub">M1: ${m1.atrasado} · M2: ${m2.atrasado}</div></div>
      <div class="kpi warn"><div class="lbl">Contas Postergadas</div><div class="val">${totPost}</div><div class="sub">M1: ${m1.postergado} · M2: ${m2.postergado}</div></div>
      <div class="kpi" style="border-color:#cf222e30"><div class="lbl">Churn</div><div class="val" style="color:#8a0000">${totCh}</div><div class="sub">M1: ${m1.churn} · M2: ${m2.churn}</div></div>
      <div class="kpi ${delta>=0?'ok':'danger'}"><div class="lbl">Delta Revisada vs Contratada</div><div class="val" style="font-size:16px">${delta>=0?'+':''}${fmtE(delta)}</div><div class="sub">Contratada: ${fmtE(totC)} · Revisada: ${fmtE(totR)}</div></div>
    </div>
    <div class="section-title">Risco por Target e Cluster</div>
    <div class="target-split">${buildTgtCard('M1',m1)}${buildTgtCard('M2',m2)}</div>`;
}
function buildTgtCard(t,d){
  const delta=d.recarga_revisada-d.recarga_contratada,dCol=delta>=0?'var(--green)':'var(--red)';
  return`<div class="split-card"><div class="split-hdr"><span class="tag">Target ${t}</span><span style="color:var(--muted);font-size:11px">Contratada: <b style="color:var(--blue)">${fmtE(d.recarga_contratada)}</b> → Revisada: <b style="color:var(--green)">${fmtE(d.recarga_revisada)}</b> · Δ <b style="color:${dCol}">${delta>=0?'+':''}${fmtE(delta)}</b></span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)">
    <div style="padding:10px 14px;border-right:1px solid var(--border)"><div style="font-size:10px;color:var(--purple);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">📦 Estoque</div><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="badge atrasado">🔴 ${d.estoque.atrasado}</span><span class="badge postergada">⚠️ ${d.estoque.postergado}</span><span class="badge churn">❌ ${d.estoque.churn}</span></div></div>
    <div style="padding:10px 14px"><div style="font-size:10px;color:var(--blue);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">🆕 Novos</div><div style="display:flex;gap:7px;flex-wrap:wrap"><span class="badge atrasado">🔴 ${d.novos.atrasado}</span><span class="badge postergada">⚠️ ${d.novos.postergado}</span><span class="badge churn">❌ ${d.novos.churn}</span></div></div>
  </div></div>`;
}

      <div class="handover-body">
        <div class="handover-grid">
          <div class="hw-kpi"><div class="lbl">Total Empresas Pendentes</div><div class="val">${hw.total}</div><div class="sub">M1: ${hw.targets.M1.count} · M2: ${hw.targets.M2.count}</div></div>
          <div class="hw-kpi"><div class="lbl">Recarga Contratada em Risco</div><div class="val" style="font-size:16px">${fmtE(totC)}</div><div class="sub">M1: ${fmtE(hw.targets.M1.recarga_contratada)} · M2: ${fmtE(hw.targets.M2.recarga_contratada)}</div></div>
          <div class="hw-kpi"><div class="lbl">Estoque Pendente Handover</div><div class="val">${hw.targets.M1.estoque.count+hw.targets.M2.estoque.count}</div><div class="sub">M1: ${hw.targets.M1.estoque.count} · M2: ${hw.targets.M2.estoque.count}</div></div>
          <div class="hw-kpi"><div class="lbl">Novos Pendente Handover</div><div class="val">${hw.targets.M1.novos.count+hw.targets.M2.novos.count}</div><div class="sub">M1: ${hw.targets.M1.novos.count} · M2: ${hw.targets.M2.novos.count}</div></div>
        </div>
        <div class="handover-targets">${tgtsHtml}</div>
      </div>
    </div>`;
}

// ── COORDS
function buildCoords(){
  let html='';
  for(const[cName,cData] of Object.entries(RAW.coordenadores)){
    const execs=cData.executivos;
    let totAt=0,totPost=0,totCh=0,totC=0,totR=0;
    for(const ex of Object.values(execs)){
      totC+=ex.recarga_contratada;totR+=ex.recarga_revisada;
      for(const cl of Object.values(ex.clusters))for(const tgt of Object.values(cl.targets)){
        totAt+=tgt.status_counts.atrasado||0;totPost+=tgt.status_counts.postergada||0;totCh+=tgt.status_counts.churn||0;
      }
    }
    const delta=totR-totC,safeId=cName.replace(/\s+/g,'_');
    html+=`<div class="coord-block" id="coord-${safeId}">
      <div class="coord-hdr" onclick="toggleCoord(this)">
        <div class="coord-hdr-left"><span class="chevron">▶</span><h2>${cName}</h2><span style="color:var(--muted);font-size:11px">${Object.keys(execs).length} executivo(s)</span></div>
        <div class="coord-meta">
          ${totAt>0?`<span class="meta-pill red">🔴 ${totAt} Atrasado</span>`:''}
          ${totPost>0?`<span class="meta-pill yellow">⚠️ ${totPost} Postergado</span>`:''}
          ${totCh>0?`<span class="meta-pill red">❌ ${totCh} Churn</span>`:''}
          <span class="meta-pill blue">Contrat. ${fmtE(totC)}</span>
          <span class="meta-pill ${delta>=0?'green':'red'}">Δ ${delta>=0?'+':''}${fmtE(delta)}</span>
        </div>
      </div>
      <div class="coord-body"><div class="exec-grid">${Object.entries(execs).map(([n,d])=>buildExec(n,d)).join('')}</div></div>
    </div>`;
  }
  document.getElementById('coord-sections').innerHTML=html;
}

function buildExec(eName,eData){
  const delta=eData.recarga_revisada-eData.recarga_contratada;
  const mx=Math.max(eData.recarga_contratada,eData.recarga_revisada,1);
  const pC=Math.min(100,eData.recarga_contratada/mx*100),pR=Math.min(100,eData.recarga_revisada/mx*100);
  const dSign=delta>=0?'+':'',dCls=delta>=0?'pos':'red';
  const dPct=eData.recarga_contratada>0?' ('+(delta/eData.recarga_contratada*100).toFixed(1)+'%)':'';
  let totals={};
  for(const cl of Object.values(eData.clusters))for(const tgt of Object.values(cl.targets))for(const[k,v] of Object.entries(tgt.status_counts))totals[k]=(totals[k]||0)+v;
  const badges=['atrasado','postergada','churn','no_prazo','antecipada'].filter(k=>totals[k]).map(k=>`<span class="badge ${k}">${SM[k].label} ${totals[k]}</span>`).join('');
  const nc=totals.nao_considerado||0;
  const clusters=Object.entries(eData.clusters).map(([clName,clData])=>{
    const cls=clName==='Estoque'?'estoque':'novos',icon=clName==='Estoque'?'📦':'🆕';
    return`<div class="cluster-section"><div class="cluster-lbl ${cls}">${icon} ${clName}</div>${Object.entries(clData.targets).map(([t,d])=>buildTgtRow(t,d)).join('')}</div>`;
  }).join('');
  return`<div class="exec-card" data-exec="${eName.toLowerCase()}">
    <div class="exec-hdr" onclick="toggleExec(this)"><div class="exec-name">👤 ${eName}</div><span class="chevron">▶</span></div>
    <div class="exec-fin">
      <div class="fin-item"><span class="fin-lbl">Contratada</span><span class="fin-val blue">${fmt(eData.recarga_contratada)}</span></div>
      <div style="color:var(--muted)">→</div>
      <div class="fin-item"><span class="fin-lbl">Revisada</span><span class="fin-val green">${fmt(eData.recarga_revisada)}</span></div>
      <div class="fin-item"><span class="fin-lbl">Delta${dPct}</span><span class="fin-val ${dCls}">${dSign}${fmt(delta)}</span></div>
      <div class="track-wrap"><div class="track"><div class="bar-c" style="width:${pC}%"></div><div class="bar-r" style="width:${pR}%"></div></div></div>
    </div>
    <div class="exec-status">${badges}${nc?`<span class="badge nao_considerado">🎯 N/C ${nc}</span>`:''}</div>
    <div class="exec-body">${clusters}</div>
  </div>`;
}

function buildTgtRow(target,tData){
  const sc=tData.status_counts;
  const badges=['atrasado','postergada','churn','no_prazo','antecipada','nao_considerado'].filter(k=>sc[k]).map(k=>`<span class="badge ${k}">${SM[k].label} ${sc[k]}</span>`).join('');
  const delta=tData.recarga_revisada-tData.recarga_contratada,dSign=delta>=0?'+':'',dCol=delta>=0?'var(--green)':'var(--red)';
  const detailsHtml=DO.filter(k=>(tData.details||{})[k]?.length).map(k=>buildSS(k,tData.details[k])).join('');
  const hasD=detailsHtml.length>0;
  return`<div class="tgt-row">
    <div class="tgt-hdr" ${hasD?'onclick="toggleTgt(this)"':'style="cursor:default"'}>
      <span class="tgt-tag">Target ${target}</span>
      <div class="tgt-badges">${badges}</div>
      <div class="tgt-fin"><span style="color:var(--blue)">${fmt(tData.recarga_contratada)}</span><span>→</span><span style="color:var(--green)">${fmt(tData.recarga_revisada)}</span><span style="color:${dCol};font-weight:600">${dSign}${fmt(delta)}</span>${hasD?'<span style="color:var(--muted)">▶</span>':''}</div>
    </div>
    ${hasD?`<div class="tgt-details">${detailsHtml}</div>`:''}
  </div>`;
}

function buildSS(sk,items){
  const meta=SM[sk];
  const rows=items.map(item=>{
    const desc=(item.descricao&&item.descricao!=='#REF!')?item.descricao:'—';
    const iD=item.recarga_revisada-item.recarga_contratada;
    return`<tr><td><div class="co">${item.empresa}</div></td><td class="money">${fmt(item.recarga_contratada)}</td><td class="money ${iD>=0?'pos':'neg'}">${fmt(item.recarga_revisada)}</td><td><div class="desc">${desc}</div></td></tr>`;
  }).join('');
  return`<div class="ss ${sk}"><div class="ss-hdr" onclick="toggleSS(this)"><span>${meta.label} — ${items.length} empresa(s)</span><span class="ss-chev">▶</span></div><div class="ss-body"><table class="dtable"><thead><tr><th style="width:28%">Empresa</th><th style="width:13%">Contratada</th><th style="width:13%">Revisada</th><th>Descrição / Histórico</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ── INTERACTIONS
function toggleCoord(el){el.closest('.coord-block').classList.toggle('open')}
function toggleExec(el){const b=el.closest('.exec-card').querySelector('.exec-body'),c=el.querySelector('.chevron'),o=b.style.display==='block';b.style.display=o?'none':'block';c.style.transform=o?'':'rotate(90deg)'}
function toggleTgt(el){const d=el.closest('.tgt-row').querySelector('.tgt-details');if(!d)return;const o=d.style.display==='block';d.style.display=o?'none':'block'}
function toggleSS(el){el.closest('.ss').classList.toggle('open')}
function toggleHandover(){const b=document.querySelector('.handover-block'),c=document.getElementById('hw-chev');b.classList.toggle('open');c.style.transform=b.classList.contains('open')?'rotate(90deg)':''}
let allExp=false;
function toggleAll(){allExp=!allExp;document.querySelectorAll('.coord-block').forEach(b=>b.classList.toggle('open',allExp));document.querySelectorAll('.exec-body').forEach(b=>b.style.display=allExp?'block':'none');document.querySelectorAll('.exec-hdr .chevron').forEach(c=>c.style.transform=allExp?'rotate(90deg)':'');document.querySelector('.expand-btn').textContent=allExp?'Recolher Todos':'Expandir Todos'}
function filterCoord(n,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.coord-block').forEach(b=>{b.style.display=(n==='all'||b.id==='coord-'+n)?'':'none'})}
function searchDashboard(q){q=q.toLowerCase().trim();if(!q){document.querySelectorAll('.exec-card,.coord-block').forEach(e=>e.style.display='');return}document.querySelectorAll('.coord-block').forEach(coord=>{let any=false;coord.querySelectorAll('.exec-card').forEach(card=>{const show=card.textContent.toLowerCase().includes(q);card.style.display=show?'':'none';if(show)any=true});coord.style.display=any?'':'none';if(any)coord.classList.add('open')})}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('pt-BR')}
setInterval(updateClock,1000);updateClock();
buildSummary();buildHandover();buildCoords();
</script>
</body>
</html>
