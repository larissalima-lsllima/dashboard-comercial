<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Qualidade Comercial – Onboarding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface2: #eaeef2;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #636e7b;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #e3b341;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cyan: #79c0ff;
    --pink: #ff7b72;
    --accent: #1f6feb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }

  /* TOP BAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  .topbar span { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* SUMMARY */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .kpi-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .kpi-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kpi-card.danger .value { color: var(--red); }
  .kpi-card.warn .value { color: var(--yellow); }
  .kpi-card.ok .value { color: var(--green); }
  .kpi-card.info .value { color: var(--blue); }

  /* TARGET SPLIT TABLE */
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .summary-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .split-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .split-card-header {
    padding: 10px 14px;
    background: var(--surface2);
    font-weight: 600;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .split-card-header .tag {
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
  }

  .split-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .split-row:last-child { border-bottom: none; }
  .split-col {
    padding: 8px 14px;
    border-right: 1px solid var(--border);
    font-size: 12px;
  }
  .split-col:last-child { border-right: none; }
  .split-col .col-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .split-col .col-val { font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .split-col .col-val.red { color: var(--red); }
  .split-col .col-val.yellow { color: var(--yellow); }
  .split-col .col-val.blue { color: var(--blue); }

  /* COORD ACCORDION */
  .coord-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .coord-header {
    padding: 14px 20px;
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .coord-header:hover { background: var(--surface2); }
  .coord-header-left { display: flex; align-items: center; gap: 12px; }
  .coord-header-left h2 { font-size: 13px; font-weight: 700; letter-spacing: .03em; }
  .coord-meta { display: flex; gap: 16px; align-items: center; }
  .meta-pill {
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid;
  }
  .meta-pill.red { color: var(--red); border-color: var(--red); background: rgba(248,81,73,.08); }
  .meta-pill.yellow { color: var(--yellow); border-color: var(--yellow); background: rgba(210,153,34,.08); }
  .meta-pill.blue { color: var(--blue); border-color: var(--blue); background: rgba(88,166,255,.08); }
  .meta-pill.green { color: var(--green); border-color: var(--green); background: rgba(63,185,80,.08); }
  .meta-pill.purple { color: var(--purple); border-color: var(--purple); background: rgba(188,140,255,.08); }

  .chevron { color: var(--muted); transition: transform .2s; font-size: 14px; }
  .coord-block.open .chevron { transform: rotate(90deg); }

  .coord-body { display: none; padding: 16px 20px; }
  .coord-block.open .coord-body { display: block; }

  /* EXEC CARD */
  .exec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 14px;
  }
  .exec-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .exec-header {
    background: var(--surface2);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .exec-header:hover { background: var(--surface2); }
  .exec-name { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .exec-name .icon { font-size: 14px; }

  .exec-summary-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  /* STATUS BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    border: 1px solid;
    white-space: nowrap;
  }
  .badge.atrasado { color: var(--red); border-color: var(--red); background: rgba(248,81,73,.1); }
  .badge.postergada { color: var(--yellow); border-color: var(--yellow); background: rgba(210,153,34,.1); }
  .badge.churn { color: var(--pink); border-color: var(--pink); background: rgba(255,123,114,.1); }
  .badge.no_prazo { color: var(--green); border-color: var(--green); background: rgba(63,185,80,.1); }
  .badge.antecipada { color: var(--cyan); border-color: var(--cyan); background: rgba(121,192,255,.1); }
  .badge.nao_considerado { color: var(--muted); border-color: var(--border); background: transparent; }

  /* RECARGA COMPARISON */
  .recarga-bar-wrap {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .recarga-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 10px;
    color: var(--muted);
  }
  .recarga-track {
    position: relative;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: visible;
  }
  .recarga-bar-contratada {
    position: absolute;
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    top: 0; left: 0;
  }
  .recarga-bar-revisada {
    position: absolute;
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    top: 0; left: 0;
    opacity: .8;
  }
  .recarga-values {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }
  .recarga-values span { color: var(--muted); }
  .rv-contratada { color: var(--blue) !important; }
  .rv-revisada { color: var(--green) !important; }
  .rv-delta-neg { color: var(--red) !important; }
  .rv-delta-pos { color: var(--green) !important; }

  /* CLUSTER SECTIONS */
  .cluster-body { padding: 0 14px 14px; }
  .cluster-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 700;
    padding: 10px 0 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cluster-label.estoque { color: var(--purple); }
  .cluster-label.novos { color: var(--cyan); }

  .target-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .target-row-header {
    padding: 6px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .target-row-header:hover { background: var(--surface2); }
  .target-tag { font-size: 10px; font-weight: 700; color: var(--orange); }
  .target-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .target-content { padding: 10px 12px; display: none; }
  .target-row.open .target-content { display: block; }

  /* DETAIL TABLE */
  .detail-section {
    margin-bottom: 10px;
  }
  .detail-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
  }
  .detail-section-label.atrasado { background: rgba(248,81,73,.15); color: var(--red); }
  .detail-section-label.postergada { background: rgba(210,153,34,.15); color: var(--yellow); }
  .detail-section-label.churn { background: rgba(255,123,114,.15); color: var(--pink); }

  .detail-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .detail-table th {
    text-align: left;
    padding: 5px 8px;
    background: var(--surface2);
    color: var(--muted);
    font-weight: 500;
    border: 1px solid var(--border);
    font-size: 10px;
  }
  .detail-table td {
    padding: 6px 8px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  .detail-table tr:nth-child(even) td { background: rgba(0,0,0,.02); }
  .empresa-name { font-weight: 600; color: var(--cyan); margin-bottom: 2px; }
  .desc-text {
    color: var(--muted);
    font-size: 10px;
    line-height: 1.4;
    max-height: 70px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-family: 'IBM Plex Mono', monospace;
  }
  .money { font-family: 'IBM Plex Mono', monospace; font-size: 10px; }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar label { font-size: 11px; color: var(--muted); }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .search-input {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    width: 220px;
    margin-left: auto;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .no-data { color: var(--muted); font-size: 11px; font-style: italic; padding: 8px 0; }

  .recarga-comp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-bottom: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  .rcg-cell {
    background: var(--surface2);
    padding: 6px 10px;
  }
  .rcg-cell .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing:.06em; }
  .rcg-cell .val { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; }

  .expand-all-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .expand-all-btn:hover { background: var(--surface2); color: var(--text); }
</style>
</head>

</div>

const STATUS_LABELS = {
  postergada: { label: '⚠️ Postergada', cls: 'postergada' },
  no_prazo:   { label: '✅ No Prazo',    cls: 'no_prazo' },
  churn:      { label: '❌ Churn',       cls: 'churn' },
  atrasado:   { label: '🔴 Atrasado',   cls: 'atrasado' },
  antecipada: { label: '🚀 Antecipada', cls: 'antecipada' },
  nao_considerado: { label: '🎯 N/C', cls: 'nao_considerado' },
};
const DETAIL_STATUSES = ['postergada','churn','atrasado'];

function fmt(v) {
  if (!v || v === 0) return 'R$ —';
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function pct(a, b) {
  if (!b) return null;
  return ((a - b) / b * 100).toFixed(1);
}

// ---- SUMMARY ----
function buildSummary() {
  const s = RAW.summary;
  const m1 = s.por_target.M1;
  const m2 = s.por_target.M2;

  const totalAtrasado = m1.atrasado + m2.atrasado;
  const totalPostergado = m1.postergado + m2.postergado;
  const totalChurn = m1.churn + m2.churn;
  const totalContratado = m1.recarga_contratada + m2.recarga_contratada;
  const totalRevisado = m1.recarga_revisada + m2.recarga_revisada;
  const delta = totalRevisado - totalContratado;

  const kpiHtml = `
  <div class="summary-grid" style="margin-top:0">
    <div class="kpi-card danger">
      <div class="label">Contas Atrasadas</div>
      <div class="value">${totalAtrasado}</div>
      <div class="sub">M1: ${m1.atrasado} · M2: ${m2.atrasado}</div>
    </div>
    <div class="kpi-card warn">
      <div class="label">Contas Postergadas</div>
      <div class="value">${totalPostergado}</div>
      <div class="sub">M1: ${m1.postergado} · M2: ${m2.postergado}</div>
    </div>
    <div class="kpi-card" style="border-color:#ff7b72">
      <div class="label">Churn</div>
      <div class="value" style="color:var(--pink)">${totalChurn}</div>
      <div class="sub">M1: ${m1.churn} · M2: ${m2.churn}</div>
    </div>
    <div class="kpi-card ${delta >= 0 ? 'ok' : 'danger'}">
      <div class="label">Delta Contratada vs Revisada</div>
      <div class="value" style="font-size:18px">${delta >= 0 ? '+' : ''}${fmt(delta)}</div>
      <div class="sub">Contratada: ${fmt(totalContratado)}</div>
    </div>
  </div>`;

  const splitHtml = `
  <div class="summary-split" style="margin-bottom:24px">
    ${buildTargetCard('M1', m1)}
    ${buildTargetCard('M2', m2)}
  </div>`;

  document.getElementById('summary-section').innerHTML = `
    <div class="section-title" style="margin-top:16px">Resumo Geral</div>
    ${kpiHtml}
    <div class="section-title">Risco por Target e Cluster</div>
    ${splitHtml}
  `;
}

function buildTargetCard(target, t) {
  const delta = t.recarga_revisada - t.recarga_contratada;
  const deltaSign = delta >= 0 ? '+' : '';
  const deltaClass = delta >= 0 ? 'blue' : 'red';
  return `
  <div class="split-card">
    <div class="split-card-header">
      <span class="tag">Target ${target}</span>
      <span style="color:var(--muted);font-size:11px">
        Contratada: <b style="color:var(--blue)">${fmt(t.recarga_contratada)}</b> &nbsp;|&nbsp;
        Revisada: <b style="color:var(--green)">${fmt(t.recarga_revisada)}</b> &nbsp;|&nbsp;
        Delta: <b style="color:${delta>=0?'var(--green)':'var(--red)'}">${deltaSign}${fmt(delta)}</b>
      </span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)">
      <div style="padding:8px 14px;border-right:1px solid var(--border)">
        <div style="font-size:10px;color:var(--purple);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">📦 Estoque</div>
        <div style="display:flex;gap:10px">
          <span class="badge atrasado">${t.estoque.atrasado} Atrasado</span>
          <span class="badge postergada">${t.estoque.postergado} Postergado</span>
          <span class="badge churn">${t.estoque.churn} Churn</span>
        </div>
      </div>
      <div style="padding:8px 14px">
        <div style="font-size:10px;color:var(--cyan);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">🆕 Novos</div>
        <div style="display:flex;gap:10px">
          <span class="badge atrasado">${t.novos.atrasado} Atrasado</span>
          <span class="badge postergada">${t.novos.postergado} Postergado</span>
          <span class="badge churn">${t.novos.churn} Churn</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ---- COORDINATORS ----
function buildCoords() {
  const container = document.getElementById('coord-sections');
  let html = '';

  for (const [coordName, coordData] of Object.entries(RAW.coordenadores)) {
    const execs = coordData.executivos;
    // Aggregate coord-level stats
    let totalAtrasado = 0, totalPostergado = 0, totalChurn = 0;
    let totalContratada = 0, totalRevisada = 0;

    for (const ex of Object.values(execs)) {
      totalContratada += ex.recarga_contratada;
      totalRevisada += ex.recarga_revisada;
      for (const cl of Object.values(ex.clusters)) {
        for (const tgt of Object.values(cl.targets)) {
          totalAtrasado += tgt.status_counts.atrasado || 0;
          totalPostergado += tgt.status_counts.postergada || 0;
          totalChurn += tgt.status_counts.churn || 0;
        }
      }
    }
    const delta = totalRevisada - totalContratada;

    html += `
    <div class="coord-block" id="coord-${coordName.replace(/\s+/g,'_')}">
      <div class="coord-header" onclick="toggleCoord(this)">
        <div class="coord-header-left">
          <span class="chevron">▶</span>
          <h2>${coordName}</h2>
          <span style="color:var(--muted);font-size:11px">${Object.keys(execs).length} executivo(s)</span>
        </div>
        <div class="coord-meta">
          ${totalAtrasado > 0 ? `<span class="meta-pill red">🔴 ${totalAtrasado} Atrasado</span>` : ''}
          ${totalPostergado > 0 ? `<span class="meta-pill yellow">⚠️ ${totalPostergado} Postergado</span>` : ''}
          ${totalChurn > 0 ? `<span class="meta-pill red">❌ ${totalChurn} Churn</span>` : ''}
          <span class="meta-pill blue">Contrat. ${fmt(totalContratada)}</span>
          <span class="meta-pill ${delta >= 0 ? 'green' : 'red'}">Δ ${delta >= 0 ? '+' : ''}${fmt(delta)}</span>
        </div>
      </div>
      <div class="coord-body">
        <div class="exec-grid">
          ${Object.entries(execs).map(([eName, eData]) => buildExecCard(eName, eData)).join('')}
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function buildExecCard(eName, eData) {
  const delta = eData.recarga_revisada - eData.recarga_contratada;
  const maxVal = Math.max(eData.recarga_contratada, eData.recarga_revisada, 1);
  const pctContratada = Math.min(100, (eData.recarga_contratada / maxVal) * 100);
  const pctRevisada = Math.min(100, (eData.recarga_revisada / maxVal) * 100);
  const deltaSign = delta >= 0 ? '+' : '';
  const deltaColor = delta >= 0 ? 'var(--green)' : 'var(--red)';

  // Aggregate status counts across all clusters/targets
  let totals = {};
  for (const cl of Object.values(eData.clusters)) {
    for (const tgt of Object.values(cl.targets)) {
      for (const [k,v] of Object.entries(tgt.status_counts)) {
        totals[k] = (totals[k] || 0) + v;
      }
    }
  }

  const badgesHtml = Object.entries(totals)
    .filter(([k]) => k !== 'nao_considerado')
    .map(([k,v]) => {
      const info = STATUS_LABELS[k];
      return `<span class="badge ${info.cls}">${info.label} ${v}</span>`;
    }).join('');

  const clustersHtml = Object.entries(eData.clusters).map(([clusterName, clData]) => {
    const clClass = clusterName === 'Estoque' ? 'estoque' : 'novos';
    const clIcon = clusterName === 'Estoque' ? '📦' : '🆕';
    const targetsHtml = Object.entries(clData.targets).map(([target, tData]) => {
      return buildTargetDetail(target, tData);
    }).join('');
    return `
    <div class="cluster-label ${clClass}">${clIcon} ${clusterName}</div>
    ${targetsHtml}`;
  }).join('');

  const cardId = 'exec_' + eName.replace(/\s+/g,'_') + '_' + Math.random().toString(36).substr(2,5);

  return `
  <div class="exec-card" data-exec="${eName.toLowerCase()}">
    <div class="exec-header" onclick="toggleExecCard(this)">
      <div class="exec-name"><span class="icon">👤</span>${eName}</div>
      <div style="display:flex;gap:6px;align-items:center">
        ${badgesHtml}
        <span class="chevron" style="color:var(--muted);font-size:12px;margin-left:4px">▶</span>
      </div>
    </div>
    <div class="exec-summary-row">
      <div style="width:100%">
        <div class="recarga-labels">
          <span>Recarga Contratada: <b style="color:var(--blue)">${fmt(eData.recarga_contratada)}</b></span>
          <span>Revisada: <b style="color:var(--green)">${fmt(eData.recarga_revisada)}</b></span>
          <span>Delta: <b style="color:${deltaColor}">${deltaSign}${fmt(delta)}</b> ${delta !== 0 && eData.recarga_contratada > 0 ? '(' + (delta/eData.recarga_contratada*100).toFixed(1) + '%)' : ''}</span>
        </div>
        <div class="recarga-track">
          <div class="recarga-bar-contratada" style="width:${pctContratada}%"></div>
          <div class="recarga-bar-revisada" style="width:${pctRevisada}%"></div>
        </div>
      </div>
    </div>
    <div class="exec-body" style="display:none">
      <div class="cluster-body">
        ${clustersHtml}
      </div>
    </div>
  </div>`;
}

function buildTargetDetail(target, tData) {
  const sc = tData.status_counts;
  const badgesHtml = Object.entries(sc).map(([k,v]) => {
    const info = STATUS_LABELS[k];
    if (!info) return '';
    return `<span class="badge ${info.cls}">${info.label} ${v}</span>`;
  }).join('');

  const delta = tData.recarga_revisada - tData.recarga_contratada;
  const deltaSign = delta >= 0 ? '+' : '';
  const deltaColor = delta >= 0 ? 'var(--green)' : 'var(--red)';

  let detailHtml = '';
  for (const statusKey of DETAIL_STATUSES) {
    const items = (tData.details || {})[statusKey];
    if (!items || items.length === 0) continue;
    const info = STATUS_LABELS[statusKey];
    detailHtml += `
    <div class="detail-section">
      <span class="detail-section-label ${statusKey}">${info.label} — ${items.length} empresa(s)</span>
      <table class="detail-table">
        <thead>
          <tr>
            <th style="width:30%">Empresa</th>
            <th style="width:15%">Contratada</th>
            <th style="width:15%">Revisada</th>
            <th>Descrição / Histórico</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => {
            const d = item.descricao && item.descricao !== '#REF!' ? item.descricao : '—';
            const itemDelta = item.recarga_revisada - item.recarga_contratada;
            return `
            <tr>
              <td><div class="empresa-name">${item.empresa}</div></td>
              <td class="money">${fmt(item.recarga_contratada)}</td>
              <td class="money" style="color:${itemDelta >= 0 ? 'var(--green)':'var(--red)'}">${fmt(item.recarga_revisada)}</td>
              <td><div class="desc-text">${d}</div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  const hasDetails = detailHtml.length > 0;
  const rowId = 'tr_' + Math.random().toString(36).substr(2,8);

  return `
  <div class="target-row ${hasDetails ? '' : ''}" id="${rowId}">
    <div class="target-row-header" onclick="toggleTarget(this)">
      <span class="target-tag">Target ${target}</span>
      <div class="target-badges">${badgesHtml}</div>
      <div style="margin-left:auto;display:flex;gap:8px;font-size:10px;font-family:monospace;color:var(--muted)">
        <span style="color:var(--blue)">${fmt(tData.recarga_contratada)}</span>
        <span>→</span>
        <span style="color:var(--green)">${fmt(tData.recarga_revisada)}</span>
        <span style="color:${deltaColor};font-weight:600">${deltaSign}${fmt(delta)}</span>
        ${hasDetails ? '<span style="color:var(--muted)">▶</span>' : ''}
      </div>
    </div>
    ${hasDetails ? `<div class="target-content">${detailHtml}</div>` : ''}
  </div>`;
}

// ---- INTERACTION ----
function toggleCoord(el) {
  el.closest('.coord-block').classList.toggle('open');
}
function toggleExecCard(el) {
  const body = el.closest('.exec-card').querySelector('.exec-body');
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  const chev = el.querySelector('.chevron');
  if (chev) chev.style.transform = body.style.display === 'block' ? 'rotate(90deg)' : '';
}
function toggleTarget(el) {
  const row = el.closest('.target-row');
  row.classList.toggle('open');
}

let allExpanded = false;
function toggleAll() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.coord-block').forEach(b => {
    b.classList.toggle('open', allExpanded);
  });
  document.querySelectorAll('.exec-body').forEach(b => {
    b.style.display = allExpanded ? 'block' : 'none';
  });
  document.querySelector('.expand-all-btn').textContent = allExpanded ? 'Recolher Todos' : 'Expandir Todos';
}

function filterCoord(coordName, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.coord-block').forEach(b => {
    if (coordName === 'all') {
      b.style.display = '';
    } else {
      b.style.display = b.id === 'coord-' + coordName ? '' : 'none';
    }
  });
}

function searchDashboard(query) {
  const q = query.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.exec-card').forEach(c => { c.style.display = ''; });
    document.querySelectorAll('.coord-block').forEach(b => { b.style.display = ''; });
    return;
  }
  document.querySelectorAll('.coord-block').forEach(coordBlock => {
    let anyVisible = false;
    coordBlock.querySelectorAll('.exec-card').forEach(card => {
      const text = card.textContent.toLowerCase();
      const show = text.includes(q);
      card.style.display = show ? '' : 'none';
      if (show) anyVisible = true;
    });
    coordBlock.style.display = anyVisible ? '' : 'none';
    if (anyVisible) coordBlock.classList.add('open');
  });
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleString('pt-BR');
}
setInterval(updateClock, 1000);
updateClock();

// Build coordinator filter buttons
function buildCoordFilters() {
  const bar = document.querySelector('.filter-bar');
  for (const coordName of Object.keys(RAW.coordenadores)) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = coordName.split(' ')[0];
    btn.title = coordName;
    btn.onclick = function() { filterCoord(coordName.replace(/\s+/g,'_'), this); };
    bar.insertBefore(btn, bar.querySelector('.expand-all-btn'));
  }
}

// Init
buildSummary();
buildCoords();
buildCoordFilters();
</script>
